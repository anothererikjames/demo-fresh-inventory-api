openapi: 3.0.3
info:
  title: Fresh Inventory API
  description: API for managing products, stock movements, and warehouses.
  version: 1.0.0
servers:
  - url: https://api.example.com/v1
paths:
  /products:
    get:
      summary: List products
      operationId: listProducts
      parameters:
        - name: category
          in: query
          schema:
            type: string
          description: Filter products by category
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: A list of products
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  total:
                    type: integer
                    example: 156
    post:
      summary: Create a product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreate"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          example: prod_001
    get:
      summary: Get a product by ID
      operationId: getProduct
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      summary: Update a product
      operationId: updateProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /stock-movements:
    get:
      summary: List stock movements
      operationId: listStockMovements
      parameters:
        - name: productId
          in: query
          schema:
            type: string
          description: Filter by product ID
        - name: type
          in: query
          schema:
            type: string
            enum: [inbound, outbound]
          description: Filter by movement type
      responses:
        "200":
          description: A list of stock movements
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/StockMovement"
    post:
      summary: Record a stock movement
      operationId: createStockMovement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockMovementCreate"
      responses:
        "201":
          description: Stock movement recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovement"
  /stock-movements/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          example: sm_101
    get:
      summary: Get a stock movement by ID
      operationId: getStockMovement
      responses:
        "200":
          description: Stock movement details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovement"
        "404":
          description: Stock movement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /warehouses:
    get:
      summary: List warehouses
      operationId: listWarehouses
      responses:
        "200":
          description: A list of warehouses
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Warehouse"
    post:
      summary: Create a warehouse
      operationId: createWarehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarehouseCreate"
      responses:
        "201":
          description: Warehouse created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"
  /warehouses/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          example: wh_east_01
    get:
      summary: Get a warehouse by ID
      operationId: getWarehouse
      responses:
        "200":
          description: Warehouse details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"
        "404":
          description: Warehouse not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
          example: prod_001
        name:
          type: string
          example: Wireless Bluetooth Headphones
        sku:
          type: string
          example: WBH-2026-BLK
        quantity:
          type: integer
          example: 340
        reorderPoint:
          type: integer
          example: 50
      required: [id, name, sku, quantity, reorderPoint]
    ProductCreate:
      type: object
      properties:
        name:
          type: string
          example: Wireless Bluetooth Headphones
        sku:
          type: string
          example: WBH-2026-BLK
        quantity:
          type: integer
          example: 340
        reorderPoint:
          type: integer
          example: 50
      required: [name, sku, quantity, reorderPoint]
    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        quantity:
          type: integer
        reorderPoint:
          type: integer
    StockMovement:
      type: object
      properties:
        id:
          type: string
          example: sm_101
        productId:
          type: string
          example: prod_001
        type:
          type: string
          enum: [inbound, outbound]
          example: inbound
        quantity:
          type: integer
          example: 200
        date:
          type: string
          format: date-time
          example: "2026-03-15T09:00:00Z"
      required: [id, productId, type, quantity, date]
    StockMovementCreate:
      type: object
      properties:
        productId:
          type: string
          example: prod_001
        type:
          type: string
          enum: [inbound, outbound]
          example: inbound
        quantity:
          type: integer
          example: 200
      required: [productId, type, quantity]
    Warehouse:
      type: object
      properties:
        id:
          type: string
          example: wh_east_01
        name:
          type: string
          example: East Coast Distribution Center
        location:
          type: string
          example: Newark, NJ
        capacity:
          type: integer
          example: 50000
      required: [id, name, location, capacity]
    WarehouseCreate:
      type: object
      properties:
        name:
          type: string
          example: East Coast Distribution Center
        location:
          type: string
          example: Newark, NJ
        capacity:
          type: integer
          example: 50000
      required: [name, location, capacity]
    Error:
      type: object
      properties:
        code:
          type: integer
          example: 404
        message:
          type: string
          example: Resource not found
